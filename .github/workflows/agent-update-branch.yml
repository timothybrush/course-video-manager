name: Agent Update Branch

on:
  pull_request:
    types: [labeled]

jobs:
  update-branch:
    if: github.event.label.name == 'agent:update-branch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: agent-mutate-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Transition labels — remove trigger + blocked, add updating
        run: |
          gh pr edit "$PR_NUMBER" --remove-label "agent:update-branch" || true
          gh pr edit "$PR_NUMBER" --remove-label "agent:update-branch-blocked" || true
          gh pr edit "$PR_NUMBER" --add-label "agent:updating-branch"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Ensure branch is checked out by name
        run: git checkout "$BRANCH" 2>/dev/null || git checkout -B "$BRANCH"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"

      - name: Run update-branch.ts
        id: run
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OUTPUT_DIR: ${{ runner.temp }}
        run: npx tsx .sandcastle/update-branch/update-branch.ts

      - name: Push branch (abort cleanly if non-fast-forward)
        if: success()
        env:
          SHOULD_PUSH_FILE: ${{ runner.temp }}/should_push.txt
        run: |
          if [ ! -f "$SHOULD_PUSH_FILE" ] || [ "$(cat "$SHOULD_PUSH_FILE")" != "true" ]; then
            echo "Nothing to push."
            exit 0
          fi
          set +e
          git push origin "$BRANCH" 2> push_err.txt
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            if grep -qiE "non-fast-forward|rejected|fetch first" push_err.txt; then
              echo "Branch advanced during update-branch run." > "${RUNNER_TEMP}/failure_reason.txt"
              cat push_err.txt
              exit 1
            fi
            cat push_err.txt
            exit $status
          fi

      - name: Post PR comment
        if: success()
        env:
          COMMENT_FILE: ${{ runner.temp }}/comment.md
        run: |
          if [ -f "$COMMENT_FILE" ]; then
            gh pr comment "$PR_NUMBER" --body-file "$COMMENT_FILE"
          fi

      - name: Mark blocked on failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          reason="(no reason file written — check workflow logs)"
          if [ -f "${RUNNER_TEMP}/failure_reason.txt" ]; then
            reason=$(cat "${RUNNER_TEMP}/failure_reason.txt")
          fi
          gh pr edit "$PR_NUMBER" --add-label "agent:update-branch-blocked" || true
          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          \`agent:update-branch\` run failed.

          **Reason:** $reason

          **Workflow run:** $RUN_URL

          Re-add \`agent:update-branch\` to retry.
          EOF
          )"

      - name: Always remove updating-branch label
        if: always()
        run: gh pr edit "$PR_NUMBER" --remove-label "agent:updating-branch" || true
